<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI SaaS Dashboard</title>
<link rel="stylesheet" href="CSS/style.css">
</head>

<body>

<div class="dashboard">

<!-- Sidebar -->
<aside class="sidebar">
<h2 class="logo">SaaS</h2>

<nav>
<ul>
<li><a href="#">Dashboard</a></li>
<li><a href="#">Analytics</a></li>
<li><a href="#">Users</a></li>
<li><a href="#">Reports</a></li>
<li><a href="#">Settings</a></li>
</ul>
</nav>
</aside>


<!-- Main Content -->
<main class="main-content">

<header class="header">
<h1>Analytics Dashboard</h1>
<button class="profile-btn">Profile</button>
</header>


<!-- Cards -->
<section class="cards">

<div class="card">
<h3>Total Users</h3>
<p id="users">0</p>
</div>

<div class="card">
<h3>Revenue</h3>
<p id="revenue">$0</p>
</div>

<div class="card">
<h3>Orders</h3>
<p id="orders">0</p>
</div>

<div class="card">
<h3>Growth</h3>
<p id="growth">0%</p>
</div>

</section>


<section class="charts">
<div class="chart-box">Chart Area</div>
<div class="chart-box">Chart Area</div>
</section>

</main>

</div>

<script type="module" src="JS/script.js"></script>

</body>
</html>
